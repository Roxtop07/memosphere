<!DOCTYPE html>
<html>

<head>
    <title>MemoSphere AI Settings</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            color: #1f2937;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 24px;
            margin-bottom: 24px;
            color: #667eea;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2);
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
        }
        
        button:hover {
            background: #764ba2;
        }
        
        .status {
            margin-top: 16px;
            padding: 12px;
            border-radius: 6px;
            display: none;
        }
        
        .status.success {
            display: block;
            background: #d1fae5;
            color: #065f46;
        }
        
        .status.error {
            display: block;
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>MemoSphere AI Settings</h1>

        <div class="form-group">
            <label for="openrouter_key">OpenRouter API Key</label>
            <input type="text" id="openrouter_key" placeholder="sk-or-..." spellcheck="false" />
        </div>

        <button id="save">Save Settings</button>

        <div id="status" class="status"></div>
    </div>

    <script src="options.js"></script>
</body>

</html>
